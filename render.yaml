services:
  - type: web
    name: diplom-project
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn diplom_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: diplom-project-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false